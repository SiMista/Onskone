services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: onskone:latest
    container_name: onskone
    restart: unless-stopped
    ports:
      # Nginx du VPS continuera de proxy vers 8080 sur l'host
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
    volumes:
      # Persistance de la base SQLite (tickets) entre redemarrages
      - ./data:/app/backend/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
