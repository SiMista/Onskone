# Reverse-proxy nginx pour Onskoné.
# Le backend Node (port 8080) sert TOUT : frontend statique + Socket.IO + /api.
# nginx ne fait que relayer :80 -> :8080 en gérant l'upgrade WebSocket.
#
# Installation :
#   sudo cp deploy/nginx-onskone.conf /etc/nginx/sites-available/onskone
#   sudo ln -s /etc/nginx/sites-available/onskone /etc/nginx/sites-enabled/onskone
#   sudo rm -f /etc/nginx/sites-enabled/default      # retirer le site par défaut
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS : `sudo certbot --nginx -d onskone.fr`
# (certbot réécrit ce fichier pour ajouter le 443 + redirection 80->443).

# Map nécessaire à l'upgrade WebSocket (Socket.IO). Doit être dans le contexte http :
# placée ici, elle est chargée via l'include de sites-enabled.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name onskone.fr;   # ajoute "www.onskone.fr" ici si tu as l'enregistrement DNS www
    # certbot (étape HTTPS) réécrit ce bloc : il ajoute un server{} en 443 (TLS)
    # et une redirection 80 -> 443. Garde server_name correct AVANT de lancer certbot.

    # Limite d'upload alignée sur express.json (128kb) + petite marge.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket / Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # En-têtes transmis au backend (trust proxy=1 est déjà activé côté Node)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connexions Socket.IO longues
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
